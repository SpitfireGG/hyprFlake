# ─────────────────────────────────────────────
#  tmux.conf — minimal & aesthetic
# ─────────────────────────────────────────────

# ── Prefix ────────────────────────────────────
unbind C-b
set -g prefix `
bind-key ` send-prefix

# ── Shell ─────────────────────────────────────
set-option -g default-shell /run/current-system/sw/bin/fish

# ── Core ──────────────────────────────────────
set -g default-terminal 'xterm-256color'
set -as terminal-features ",xterm-256color:RGB"
set -g history-limit 50000
set-option -s escape-time 0
set-option -g display-panes-time 2000
set-option -g display-time 1500
set-option -g lock-after-time 3600
set-option -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g set-titles on
set-window-option -g automatic-rename on
set-option -g allow-rename on
set -g mouse on

# Live search with highlighting
bind / copy-mode \; send -X search-forward
bind ? copy-mode \; send -X search-backward

# Incremental search while typing
set -g mode-keys vi
set -g mode-style "fg=#1e1e2e,bg=#cba6f7"

# ── Vi mode ───────────────────────────────────
setw -g mode-keys vi

# ── Silence ───────────────────────────────────
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# ─────────────────────────────────────────────
#  KEYBINDS
# ─────────────────────────────────────────────

# ── Config ────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "  reloaded"

# ── Popups ────────────────────────────────────
bind C-y display-popup -d "#{pane_current_path}" -w 100% -h 100% -E "lazygit"
bind C-s display-popup -d "#{pane_current_path}" -E "fish"

# ── Splits ────────────────────────────────────
unbind '"'
unbind %
unbind -
bind -  split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# ── Pane navigation (Alt + arrow, no prefix) ──
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ── Pane navigation (vi-style, no prefix) ─────
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# ── Pane resize (prefix + vi-style, repeatable)
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5

# ── Pane zoom ─────────────────────────────────
bind z resize-pane -Z

# ── Pane swap ─────────────────────────────────
bind > swap-pane -D
bind < swap-pane -U

# ── Window navigation ─────────────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-p previous-window
bind -n M-n next-window

# ── New window in current path ────────────────
bind c new-window -c "#{pane_current_path}"

# ── Session management ────────────────────────
bind S choose-session
bind N new-session
bind X kill-session

# ── Layout cycling ────────────────────────────
bind Space next-layout

# ── Copy mode (vi) ────────────────────────────
bind v copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer

# ── Quick kill ────────────────────────────────
bind q kill-pane
bind Q kill-window

# ── Move window ───────────────────────────────
bind-key -r ( swap-window -t -1 \; previous-window
bind-key -r ) swap-window -t +1 \; next-window

# ─────────────────────────────────────────────
#  AESTHETICS — Catppuccin Mocha palette
#  Status bar is OFF by default (set -g status off).
#  Toggle with prefix + B.
# ─────────────────────────────────────────────

# Toggle status bar
bind B set-option -g status

# ── Palette ───────────────────────────────────
set -g @bg        "#1e1e2e"
set -g @bg1       "#181825"
set -g @surface   "#313244"
set -g @overlay   "#6c7086"
set -g @subtle    "#45475a"
set -g @text      "#cdd6f4"
set -g @subtext   "#a6adc8"
set -g @pink      "#f38ba8"
set -g @mauve     "#cba6f7"
set -g @lavender  "#b4befe"
set -g @teal      "#94e2d5"
set -g @green     "#a6e3a1"

# ── Pane borders ──────────────────────────────
set -g pane-border-style          "fg=#313244"
set -g pane-active-border-style   "fg=#cba6f7"
set -g pane-border-lines          single

# ── Display panes ─────────────────────────────
set -g display-panes-colour        "#45475a"
set -g display-panes-active-colour "#cba6f7"

# ── Message / command bar ─────────────────────
set -g message-style         "fg=#1e1e2e,bg=#cba6f7,bold"
set -g message-command-style "fg=#1e1e2e,bg=#f38ba8,bold"

# ── Copy / selection mode ─────────────────────
set -g mode-style "fg=#1e1e2e,bg=#cba6f7"

# ── Clock ─────────────────────────────────────
set -g clock-mode-colour "#cba6f7"
set -g clock-mode-style  24

# ── Status bar — OFF by default, toggle with prefix+B ──
set -g status off
set -g status-position bottom
set -g status-interval 5
set -g status-justify  left

set -g status-style "fg=#a6adc8,bg=#181825"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#1e1e2e,bg=#cba6f7,bold]  #S #[fg=#cba6f7,bg=#181825,nobold]"

# Right: host · time
set -g status-right-length 60
set -g status-right "#[fg=#313244,bg=#181825]#[fg=#6c7086,bg=#313244]  #H #[fg=#45475a,bg=#313244]#[fg=#a6adc8,bg=#45475a]  %H:%M #[fg=#cba6f7,bg=#45475a]"

# Window list
set -g window-status-format         "#[fg=#45475a,bg=#181825] #[fg=#6c7086]#I #[fg=#45475a]#W #[fg=#181825] "
set -g window-status-current-format "#[fg=#cba6f7,bg=#181825] #[fg=#cba6f7,bold]#I #[fg=#cdd6f4]#W#F #[fg=#181825] "
set -g window-status-separator      ""
set -g window-status-activity-style "fg=#f38ba8,bg=#181825"
